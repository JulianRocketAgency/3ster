services:
  db:
    image: mysql:8.0
    container_name: driestar_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: driestar_db
      MYSQL_USER: driestar
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: driestar_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: driestar
      PMA_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data:
